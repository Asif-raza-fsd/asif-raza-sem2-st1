<!DOCTYPE html>
<html>
<head>
    <title>Vowel Checker</title>
    <style>
        body {
            background-color: grey;
            font-family: sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        input {
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: green;
            color: white;
            border: none;
        }
        button:hover {
            background-color: lightgreen;
        }
    </style>
</head>
<body>
    <h2>Vowel or Consonant Checker</h2>
    <input type="text" id="char" maxlength="1" placeholder="Enter Character">
    <button onclick="checkVowel()">Check</button>
    <p id="result"></p>
        <script>
        function checkVowel() {
            let ch = document.getElementById("char").value.toLowerCase();
            if(
                ch === "a" ||
                ch === "e" ||
                ch === "i" ||
                ch === "o" ||
                ch === "u"
            )
            {
                document.getElementById("result").innerHTML = "Vowel";
            }
            else
            {
                document.getElementById("result").innerHTML = "Consonant";
            }
        }
    </script>

</body>
</html>
